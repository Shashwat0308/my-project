<svg width="200" height="120" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="120" fill="#0a1628"/>
  
  <!-- VN Letter with gradient -->
  <path d="M 40 30 L 55 75 L 70 30 L 85 30 L 65 85 L 45 85 L 25 30 Z" fill="url(#logoGradient)" stroke="url(#logoGradient)" stroke-width="2"/>
  <path d="M 90 30 L 90 85 L 105 85 L 105 50 Q 105 35 120 35 Q 135 35 135 50 L 135 85 L 150 85 L 150 48 Q 150 30 130 30 Q 115 30 105 40 L 105 30 Z" fill="url(#logoGradient)" stroke="url(#logoGradient)" stroke-width="2"/>
  
  <!-- Star sparkle -->
  <g transform="translate(165, 30)">
    <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="#00d4ff" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="-12" r="1.5" fill="#00d4ff" opacity="0.7"/>
  </g>
</svg>
